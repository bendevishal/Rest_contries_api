<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Countries Explorer</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="hero-section text-white text-center py-5">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">
                <i class="bi bi-globe-americas me-3"></i>
                Rest Countries Explorer
            </h1>
            <p class="lead mb-4">Discover countries around the world with detailed information and beautiful visuals</p>
        </div>
    </header>

    <div class="container my-5">
        <!-- Search Section -->
        <div class="search-section bg-white rounded-3 shadow-sm p-4 mb-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-primary text-white border-0">
                            <i class="bi bi-search"></i>
                        </span>
                        <input
                            type="text"
                            id="search"
                            class="form-control border-0 shadow-none"
                            placeholder="Search for any country..."
                        >
                        <span class="input-group-text bg-light border-0">
                            <small class="text-muted">Type to filter countries</small>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading countries...</p>
        </div>

        <!-- Countries Grid -->
        <div class="row" id="countries"></div>

        <!-- No Results Message -->
        <div id="no-results" class="text-center my-5 d-none">
            <i class="bi bi-search text-muted" style="font-size: 3rem;"></i>
            <h4 class="text-muted mt-3">No countries found</h4>
            <p class="text-muted">Try adjusting your search terms</p>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
